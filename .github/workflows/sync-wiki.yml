name: Sync docs/wiki to GitHub Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/wiki/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: WikiリポジトリをClone
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki-repo

      - name: docs/wiki/* をWikiにコピー
        run: |
          cp docs/wiki/*.md wiki-repo/

      - name: 変更をコミット＆プッシュ
        run: |
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "変更なし、スキップします"
          else
            git commit -m "docs/wiki から自動同期 (${{ github.sha }})"
            git push
          fi
